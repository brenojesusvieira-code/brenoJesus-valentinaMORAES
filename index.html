<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>News</h1>
        <p>Noticias frescas e recentes</p>
        <style>
            header {
                background-color: #6cb5c7;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
            }

            main {
                background-color: #FFFFFF;
                color: #182963;

            }

            article {
                display: flex;
            }

            img {
                width: 80px;
                height: 80px;
            }

            .artigo-autor {
                font-weight: bold;
            }
        </style>
    </header>

    <main>
        <article>
            <img src="trofeu 2.jpg"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>COPA resultado </h2>
                <p class="artigo-autor">Por: Marcelo Paludetto</p>
                <p>argentina perde de 0 a 8 pro Brasil
                    
                   </p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>
        <article>
            <img src=""
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Jogo Triplo Copa</h2>
                <p class="artigo-autor">Por: Marcelo Paludetto</p>
                <p>Alemanha x Corea do Sul x Brasil.
                Anunciam que tera jogo de 3 times na sexta
                    </p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    });



</script>

</html>
